info:
  name: Create Account
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/account"
  body:
    type: json
    data: |-
      {
        "owner":"Jack",
        "balance": 9,
        "currency": "USD"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
